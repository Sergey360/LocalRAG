services:
  localrag-app:
    command: uvicorn main:app --host 0.0.0.0 --port 7860 --reload
    volumes:
      - type: bind
        source: ./main.py
        target: /app/main.py
      - type: bind
        source: ./app
        target: /app/app
      - type: bind
        source: ./web
        target: /app/web
